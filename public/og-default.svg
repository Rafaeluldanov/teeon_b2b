<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0F172A"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1B3258;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Left accent bar -->
  <rect x="80" y="180" width="6" height="270" fill="#E8571A" rx="3"/>
  <!-- Company name -->
  <text x="116" y="290" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="700" fill="#FFFFFF" letter-spacing="-2">TEEON</text>
  <!-- Descriptor -->
  <text x="116" y="348" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="rgba(255,255,255,0.70)">Пошив промо-одежды и корпоративного мерча под ключ</text>
  <!-- Tags -->
  <text x="116" y="408" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="rgba(255,255,255,0.38)">Собственный швейный цех · Брендирование · B2B-заказы</text>
  <!-- Bottom domain -->
  <text x="116" y="490" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(255,255,255,0.25)">teeon.ru</text>
</svg>
