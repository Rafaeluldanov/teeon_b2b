services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* запекаются в бандл во время `npm run build` —
        # их нужно передать как build args, env_file применяется только на runtime.
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_S3_PUBLIC_URL: ${NEXT_PUBLIC_S3_PUBLIC_URL}
        NEXT_PUBLIC_YANDEX_METRIKA_ID: ${NEXT_PUBLIC_YANDEX_METRIKA_ID}
    image: teeon-b2b:latest
    container_name: teeon-app
    restart: unless-stopped
    # Слушаем только loopback — наружу выпускает Caddy через https://teeon.ru
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      # внутри docker-сети ходим к MinIO по имени сервиса
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    volumes:
      - ./leads:/app/.tmp
    depends_on:
      minio-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio:latest
    container_name: teeon-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    # API (9000) — только loopback (для Caddy /s3/* и для приложения).
    # Console (9001) — тоже loopback, доступ только через SSH-туннель:
    #   ssh -L 9001:127.0.0.1:9001 ivan@185.225.34.60   → http://localhost:9001
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: teeon-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${S3_BUCKET} &&
      mc anonymous set download local/$${S3_BUCKET} &&
      echo 'MinIO bucket ready: '$${S3_BUCKET}
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}

volumes:
  minio-data:
